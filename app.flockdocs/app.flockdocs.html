<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Resolve all relative paths from the parent New_Covenant/ directory -->
  <base href="../">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no, date=no, email=no, address=no">
  <title>Docs — Productivity Suite</title>

  <!-- Icons -->
  <link rel="icon" type="image/svg+xml" href="Images/icon-flockdocs.svg">
  <link rel="apple-touch-icon" href="Images/icon-flockdocs.svg">

  <!-- PWA manifest -->
  <link rel="manifest" href="app.flockdocs/manifest.json">

  <!-- PWA meta -->
  <meta name="theme-color" content="#3b82f6">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Docs">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- SEO -->
  <meta name="description" content="Docs — Productivity suite for your church. Word processor, spreadsheets, and document management.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <!-- Flash prevention: lock the Herald theme before first paint -->
  <script>
    document.documentElement.setAttribute('data-theme', 'herald');
  </script>

  <!-- Styles — new_covenant.css contains all shared styles -->
  <link rel="stylesheet" href="Styles/new_covenant.css">
  <link rel="stylesheet" href="Styles/herald-tokens.css">
  <!-- Google Docs feature styles -->
  <link rel="stylesheet" href="Styles/flockdocs-gdocs-styles.css">
  <!-- Google Sheets feature styles -->
  <link rel="stylesheet" href="Styles/flockdocs-gsheets-styles.css">
  <link rel="stylesheet" href="Styles/docs.css">

  <!-- App-specific styles -->
</head>
<body>

  <!-- Auth gating is handled by flockdocs.js (waits for Firebase Auth state restoration before deciding). -->

  <!-- Auth gate placeholder (will be injected by firm_foundation.js) -->
  <div id="auth-gate"></div>

  <!-- Main app shell -->
  <div class="fd-wrap" id="fd-app">
    
    <!-- Topbar (unity header mounted by JS) -->
    <header class="unity-header" id="fd-topbar" role="banner"></header>

    <!-- Sidebar -->
    <div id="fd-sidebar-wrap">
      <div id="fd-sidebar">
        
        <div class="fd-sidebar-section">
          <div class="fd-sidebar-title">Library</div>
          <button class="fd-sidebar-btn is-active" data-view="all-docs">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            All Documents
          </button>
          <button class="fd-sidebar-btn" data-view="notes">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 6h8M8 10h8M8 14h5"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3h14a2 2 0 012 2v10.5L15.5 21H5a2 2 0 01-2-2V5a2 2 0 012-2z"/>
            </svg>
            Notes
          </button>
          <button class="fd-sidebar-btn" data-view="prayers">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 21s-7-4.35-7-10a7 7 0 1114 0c0 5.65-7 10-7 10z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.5 10.5h5M12 8v5"/>
            </svg>
            Prayer Requests
          </button>
          <button class="fd-sidebar-btn" data-view="journal">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 4h11a3 3 0 013 3v13H8a3 3 0 01-3-3V4z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 8h6M9 12h5"/>
            </svg>
            Journal
          </button>
          <button class="fd-sidebar-btn" data-view="calendar">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 2v4m8-4v4M4 10h16M6 5h12a2 2 0 012 2v13H4V7a2 2 0 012-2z"/>
            </svg>
            Calendar
          </button>
          <button class="fd-sidebar-btn" data-view="my-docs">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            My Documents
          </button>
          <button class="fd-sidebar-btn" data-view="shared-docs">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
            </svg>
            Shared with Church
          </button>
          <button class="fd-sidebar-btn" data-view="recent">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            Recent
          </button>
        </div>

        <div class="fd-sidebar-section">
          <div class="fd-sidebar-title">
            Folders
            <button onclick="FlockDocs.createFolder()" style="float:right;background:transparent;border:none;color:var(--fd-gold);cursor:pointer;font-size:18px;padding:0;margin:-2px 0 0;line-height:1" title="Create new folder">+</button>
          </div>
          <div id="fd-folders-list">
            <!-- Folders will be injected here -->
          </div>
        </div>

        <div class="fd-sidebar-section">
          <button class="fd-sidebar-btn" data-view="trash">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
            Trash
          </button>
        </div>

      </div>
    </div>

    <!-- Main content -->
    <div id="fd-main">
      
      <!-- Library view -->
      <div class="fd-library-view" id="fd-library-view">
        <div class="fd-library-header">
          <h1 class="fd-library-title" id="fd-library-title">All Documents</h1>
          <button id="fd-empty-trash-btn" class="fd-btn fd-btn--danger" style="display:none" onclick="FlockDocs.emptyTrash()">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
            Empty Trash
          </button>
          <div class="fd-search-box">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <input type="text" placeholder="Search documents..." id="fd-search-input">
          </div>
        </div>

        <div id="fd-doc-list">
          <!-- Documents will be injected here -->
          <div class="fd-empty-state">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            <h3>No documents yet</h3>
            <p>Create your first document to get started</p>
            <button class="fd-btn fd-btn--primary" onclick="FlockDocs.createNewDocument()">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
              </svg>
              Create Document
            </button>
          </div>
        </div>
      </div>

      <!-- Editor view -->
      <div class="fd-editor-view hidden" id="fd-editor-view">
        <!-- Quill bar (mounted by the_quill.js) -->
        <div id="fd-quill-bar"></div>

        <div class="fd-editor-container">
          <div class="fd-editor-page" id="fd-editor-page">
            <div class="fd-editor-content" contenteditable="true" id="fd-editor-content">
              <h1>Untitled Document</h1>
              <p>Start typing...</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Spreadsheet view -->
      <div class="fd-spreadsheet-view hidden" id="fd-spreadsheet-view">
        <!-- Formatting Toolbar -->
        <div class="fd-ss-format-bar" id="fd-ss-format-bar">
          <button class="fd-toolbar-btn" data-action="back" title="Back to library">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="18" height="18">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
          </button>

          <div class="fd-ss-toolbar-divider"></div>

          <!-- Number Format -->
          <select class="fd-ss-format-select" id="fd-ss-number-format" title="Number format">
            <option value="general">Automatic</option>
            <option value="number">Number</option>
            <option value="currency">Currency</option>
            <option value="percent">Percent</option>
            <option value="date">Date</option>
            <option value="time">Time</option>
            <option value="text">Plain text</option>
          </select>

          <div class="fd-ss-toolbar-divider"></div>

          <!-- Font Styling -->
          <button class="fd-ss-toolbar-btn" data-format="bold" title="Bold">
            <b>B</b>
          </button>
          <button class="fd-ss-toolbar-btn" data-format="italic" title="Italic">
            <i>I</i>
          </button>
          <button class="fd-ss-toolbar-btn" data-format="underline" title="Underline">
            <u>U</u>
          </button>

          <div class="fd-ss-toolbar-divider"></div>

          <!-- Alignment -->
          <button class="fd-ss-toolbar-btn" data-action="align-left" title="Align left">
            ≡
          </button>
          <button class="fd-ss-toolbar-btn" data-action="align-center" title="Align center">
            ≣
          </button>
          <button class="fd-ss-toolbar-btn" data-action="align-right" title="Align right">
            ≢
          </button>

          <div class="fd-ss-toolbar-divider"></div>

          <!-- Data Tools -->
          <button class="fd-ss-toolbar-btn" id="fd-ss-merge-cells" title="Merge cells">
            ⊞
          </button>
          <button class="fd-ss-toolbar-btn" id="fd-ss-wrap-text" title="Wrap text">
            ↩
          </button>

          <div class="fd-ss-toolbar-divider"></div>

          <!-- Insert Tools -->
          <button class="fd-ss-toolbar-btn" id="fd-ss-insert-chart" title="Insert chart">
            📊
          </button>
          <button class="fd-ss-toolbar-btn" id="fd-ss-add-filter" title="Create a filter">
            🔽
          </button>
          <button class="fd-ss-toolbar-btn" id="fd-ss-pivot-table" title="Pivot table">
            🎯
          </button>

          <div class="fd-ss-toolbar-divider"></div>

          <!-- Protection & More -->
          <button class="fd-ss-toolbar-btn" id="fd-ss-protect-range" title="Protect range">
            🔒
          </button>
          <button class="fd-ss-toolbar-btn" id="fd-ss-data-validation" title="Data validation">
            ✓
          </button>
          <button class="fd-ss-toolbar-btn" id="fd-ss-conditional-format" title="Conditional formatting">
            🎨
          </button>

          <div class="fd-spacer"></div>

          <!-- Import/Export -->
          <input type="file" id="fd-excel-import" accept=".xlsx,.xls" style="display:none">
          <button class="fd-btn fd-btn--ghost" onclick="document.getElementById('fd-excel-import').click()" title="Import Excel">
            Import
          </button>
          <button class="fd-btn fd-btn--ghost" onclick="FlockDocs.exportToExcel()" title="Export Excel">
            Export
          </button>
          <button class="fd-btn fd-btn--primary" onclick="FlockDocs.saveDocument()">Save</button>
        </div>

        <!-- Formula Bar -->
        <div class="fd-ss-formula-bar">
          <div class="fd-ss-cell-ref" id="fd-ss-cell-ref">A1</div>
          <input type="text" class="fd-ss-formula-input" id="fd-ss-formula-bar" placeholder="Enter a value or formula">
        </div>

        <div class="fd-spreadsheet-header">
          <h2 id="fd-spreadsheet-title">Untitled Spreadsheet</h2>
        </div>

        <div class="fd-ss-grid-container" id="fd-spreadsheet-container">
          <!-- Spreadsheet grid will be rendered here -->
        </div>
      </div>

    </div>

    <!-- Footer -->
    <div id="fd-footer">
      <div>Docs — Productivity Suite for Your Church</div>
      <div id="fd-save-status">All changes saved</div>
    </div>

  </div>

  <!-- Modal Dialogs -->
  <div id="fd-modal-overlay" class="fd-modal-overlay" onclick="_closeModal()">
    <div class="fd-modal" onclick="event.stopPropagation()">
      <div class="fd-modal-header">
        <h3 id="fd-modal-title">Confirm Action</h3>
        <button class="fd-modal-close" onclick="_closeModal()">&times;</button>
      </div>
      <div class="fd-modal-body" id="fd-modal-body">
        <!-- Dynamic content -->
      </div>
      <div class="fd-modal-footer" id="fd-modal-footer">
        <!-- Dynamic buttons -->
      </div>
    </div>
  </div>

  <!-- Context Menu -->
  <div id="fd-context-menu" class="fd-context-menu">
    <!-- Dynamic menu items -->
  </div>

  <!-- SheetJS for Excel import/export -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

  <!-- Firebase & Auth -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-messaging-compat.js" defer></script>
  
  <!-- FlockOS core scripts -->
  <script defer src="Scripts/firm_foundation.js"></script>
  <script defer src="Scripts/the_upper_room.js"></script>
  <script defer src="Scripts/the_true_vine.js"></script>

  <!-- Docs app logic -->
  <script src="app.flockdocs/flockdocs.js?v=3" type="module"></script>
  <!-- Google Docs features -->
  <script defer src="app.flockdocs/flockdocs-gdocs-features.js"></script>
  <!-- Google Sheets features -->
  <script defer src="app.flockdocs/flockdocs-gsheets-features.js"></script>

</body>
</html>

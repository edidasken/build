<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Resolve all relative paths from the parent New_Covenant/ directory -->
  <base href="../">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no, date=no, email=no, address=no">
  <title>FlockStand — FlockOS</title>

  <!-- PWA -->
  <link rel="manifest" href="app.stand/manifest.json">
  <link rel="icon" type="image/svg+xml" href="Images/icon-stand.svg">
  <link rel="apple-touch-icon" href="Images/stand.png">
  <meta name="theme-color" content="#a855f7">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="FlockStand">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- SEO -->
  <meta name="description" content="FlockOS FlockStand — the worship team's complete digital music stand. Song library, service plans, live presenter, key transposition, Nashville Number System, chord diagrams, and imports from CCLI SongSelect and Planning Center.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Merriweather:wght@700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <!-- Firebase preconnect -->
  <link rel="preconnect" href="https://firestore.googleapis.com">
  <link rel="preconnect" href="https://identitytoolkit.googleapis.com">
  <link rel="preconnect" href="https://securetoken.googleapis.com">
  <link rel="dns-prefetch" href="https://firestore.googleapis.com">

  <!-- Flash prevention: lock the Herald theme before first paint -->
  <script>
    document.documentElement.setAttribute('data-theme', 'herald');
  </script>

  <!-- App CSS -->
  <link rel="stylesheet" href="Styles/new_covenant.css">
  <link rel="stylesheet" href="Styles/herald-tokens.css">
  <link rel="stylesheet" href="Styles/flockstand.css">

  <!-- Flash prevention + base vars -->
</head>
<body class="stand-app">

  <!-- Boot splash (hidden once app mounts) -->
  <div id="ms-boot">
    <div class="ms-boot-icon">🎵</div>
    <div class="ms-boot-label">FLOCK STAND</div>
  </div>

  <!-- Auth overlay (populated by stand.js when user is not signed in) -->
  <div id="ms-auth-overlay" hidden></div>

  <!-- App root -->
  <div id="ms-app" hidden>
    <!-- Header (mounted by the_unity_header.js via stand.js) -->
    <header class="ms-header unity-header" id="ms-header"></header>
    <!-- Legacy stand-only popover (no longer wired; unity profile sheet replaces it) -->

    <!-- Body: sidebar + main -->
    <div class="ms-body">
      <!-- Sidebar nav -->
      <nav class="ms-sidebar" id="ms-sidebar" aria-label="FlockStand navigation">
        <div class="ms-nav-section">
          <button class="ms-nav-item ms-tone-violet" data-view="dashboard">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            Dashboard
          </button>
        </div>
        <div class="ms-nav-section">
          <div class="ms-nav-label">Library</div>
          <button class="ms-nav-item ms-tone-violet" data-view="songs">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
            Songs
          </button>
          <button class="ms-nav-item ms-tone-sky" data-view="import">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Import
          </button>
        </div>
        <div class="ms-nav-section">
          <div class="ms-nav-label">Planning</div>
          <button class="ms-nav-item ms-tone-emerald" data-view="services">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>
            Service Plans
          </button>
        </div>
        <div class="ms-nav-section">
          <div class="ms-nav-label">Suite</div>
          <a class="ms-nav-item ms-tone-gold" href="index.html">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="7" y1="8" x2="17" y2="8"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="7" y1="16" x2="13" y2="16"/></svg>
            Herald
          </a>
          <a class="ms-nav-item ms-tone-blue" href="app.flockos/app.flockos.html">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            FlockOS
          </a>
          <a class="ms-nav-item ms-tone-gold" href="app.feed/">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
            Feed
          </a>
          <a class="ms-nav-item ms-tone-red" href="app.flockshow/app.flockshow.html">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/></svg>
            FlockShow
          </a>
          <a class="ms-nav-item ms-tone-cyan" href="app.flockchat/app.flockchat.html">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            FlockChat
          </a>
          <a class="ms-nav-item ms-tone-docs" href="app.flockdocs/">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/></svg>
            Docs
          </a>
        </div>
        <div class="ms-nav-section ms-nav-section--bottom">
          <button class="ms-nav-item ms-nav-item--live ms-tone-rose" data-action="live">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
            Live Mode
          </button>
          <button class="ms-nav-item ms-tone-slate" data-view="settings">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            Settings
          </button>
        </div>
      </nav>

      <!-- Main content -->
      <main class="ms-main" id="ms-main" role="main"></main>
    </div>

    <!-- Mobile bottom nav -->
    <nav class="ms-bottom-nav" id="ms-bottom-nav" aria-label="Mobile navigation">
      <button class="ms-bnav-item ms-tone-violet" data-view="dashboard">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Home</span>
      </button>
      <button class="ms-bnav-item ms-tone-violet" data-view="songs">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        <span>Songs</span>
      </button>
      <button class="ms-bnav-item ms-bnav-item--live ms-tone-rose" data-action="live">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
        <span>Live</span>
      </button>
      <button class="ms-bnav-item ms-tone-emerald" data-view="services">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>
        <span>Services</span>
      </button>
      <button class="ms-bnav-item ms-tone-sky" data-view="import">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span>Import</span>
      </button>
    </nav>

    <!-- Toast container -->
    <div id="ms-toasts" aria-live="polite" aria-atomic="false"></div>

    <!-- Sheet/modal host -->
    <div id="ms-sheet-host"></div>


  </div>

  <!-- Live presenter overlay (full-screen) -->
  <div id="ms-live-overlay" hidden></div>

  <!-- Firebase (used for cloud sync when FLOCK_FIREBASE_CONFIG is set) -->
  <script>
    // Inherit the church Firebase config from the parent FlockOS deployment
    // (injected by A-Build_Churches.sh per-church). Falls back gracefully.
    window.FLOCK_CHURCH_ID = "flockos";
window.FLOCK_FIREBASE_CONFIG = {
  "apiKey": "AIzaSyBA-fkxjABbwIHn0i6MPiXbGwahfJmuJeo",
  "authDomain": "flockos-notify.firebaseapp.com",
  "projectId": "flockos-notify",
  "storageBucket": "flockos-notify.firebasestorage.app",
  "messagingSenderId": "321766738616",

window.FLOCK_NO_FIREBASE = false;
window.FLOCK_DATABASE_URL = "https://script.google.com/macros/s/AKfycbx2pemG039LB609OlVY-OcqLWK75qRV2ZgZNyf4Oc7dGogCR2HC4C__iWUqlG9JfYLt/exec";
  </script>
  <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-functions-compat.js"></script>

  <!-- FlockOS auth (Nehemiah — firm_foundation.js) -->
  <script defer src="Scripts/firm_foundation.js"></script>
  <!-- Firebase wrapper (window.UpperRoom) -->
  <script defer src="Scripts/the_upper_room.js"></script>
  <!-- GAS backend adapter (window.TheVine) -->
  <script defer src="Scripts/the_true_vine.js"></script>
  <!-- FlockStand chord engine -->
  <script defer src="Scripts/the_shofar/index.js"></script>

  <!-- FlockStand main module -->
  <script type="module" src="Scripts/the_app_switcher.js"></script>
  <script type="module" src="app.stand/stand.js"></script>


</body>
</html>

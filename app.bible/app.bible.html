<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <base href="../">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no, date=no, email=no, address=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bible">
  <meta name="theme-color" content="#0f172a">
  <meta name="description" content="Herald themed ESV Bible reader for lookup, notes, prayer, and study.">
  <script>
    (function () {
      document.documentElement.setAttribute('data-theme', 'herald');
      try {
        var scale = Number(localStorage.getItem('herald.text-size-scale') || '1');
        var sizes = [0.92, 1, 1.08, 1.16, 1.24, 1.32];
        var best = sizes.reduce(function (nearest, value) {
          return Math.abs(value - scale) < Math.abs(nearest - scale) ? value : nearest;
        }, 1);
        document.documentElement.style.setProperty('--reader-scale', String(best));
        document.documentElement.setAttribute('data-reader-scale', String(best));
      } catch (_) {
        document.documentElement.style.setProperty('--reader-scale', '1');
        document.documentElement.setAttribute('data-reader-scale', '1');
      }
    })();
  </script>
  <title>Bible - Herald</title>
  <link rel="manifest" href="app.bible/manifest.json">
  <link rel="icon" type="image/svg+xml" href="Images/icon-grow.svg">
  <link rel="apple-touch-icon" href="Images/icon-grow.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Merriweather:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="Styles/new_covenant.css">
  <link rel="stylesheet" href="Styles/herald-tokens.css">
  <link rel="stylesheet" href="app.bible/bible.css">
</head>
<body class="bible-app">
  <div id="bible-root">
    <header id="bible-topbar" class="unity-header bible-herald-topbar" role="banner"></header>

    <main class="bible-shell" aria-label="Bible reader">
      <aside class="bible-sidebar" id="bible-sidebar" aria-label="Bible books">
        <div class="bible-sidebar-head">
          <div>
            <div class="bible-kicker">ESV Library</div>
            <h1>Bible</h1>
          </div>
          <button class="bible-icon-btn bible-sidebar-close" id="bible-close-sidebar" type="button" aria-label="Close books" title="Close books">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </div>

        <div class="bible-filter-tabs" role="tablist" aria-label="Book filters">
          <button class="is-active" type="button" data-testament="all">All</button>
          <button type="button" data-testament="Old">Old</button>
          <button type="button" data-testament="New">New</button>
        </div>

        <label class="bible-field bible-book-filter">
          <span>Find Book</span>
          <input id="bible-book-filter" type="search" autocomplete="off" placeholder="Genesis, John, Romans">
        </label>

        <div class="bible-book-list" id="bible-book-list"></div>
      </aside>

      <section class="bible-workspace">
        <div class="bible-toolbar" aria-label="Bible controls">
          <button class="bible-icon-btn" id="bible-open-sidebar" type="button" aria-label="Open books" title="Open books">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>

          <form class="bible-reference-form" id="bible-reference-form">
            <label class="bible-field bible-reference-field">
              <span>Lookup</span>
              <input id="bible-reference-input" type="search" autocomplete="off" spellcheck="false" placeholder="John 3:16, Psalm 23, Romans 8:28-39">
            </label>
            <button class="bible-btn bible-btn-primary" type="submit">
              <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
              <span>Go</span>
            </button>
          </form>

          <button class="bible-icon-btn" id="bible-copy-passage" type="button" aria-label="Copy passage" title="Copy passage">
            <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
          <button class="bible-icon-btn" id="bible-bookmark" type="button" aria-label="Bookmark passage" title="Bookmark passage">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 21 12 17 5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          </button>
          <button class="bible-icon-btn" id="bible-note" type="button" aria-label="Save note" title="Save note">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
          </button>
          <button class="bible-icon-btn" id="bible-pray" type="button" aria-label="Pray this passage" title="Pray this passage">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H8l-5 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><path d="M8 9h8M8 13h5"/></svg>
          </button>
        </div>

        <section class="bible-today-card" aria-label="Today's One Year Bible readings">
          <div class="bible-tool-head">
            <div>
              <div class="bible-kicker">Today</div>
              <h3>One Year Bible</h3>
              <span class="bible-muted bible-reading-plan-date" id="bible-reading-plan-date"></span>
            </div>
            <div class="bible-today-actions">
              <button class="bible-mini-btn" id="bible-open-reading-plan" type="button">Plan</button>
            </div>
          </div>
          <div id="bible-reading-plan" class="bible-reading-plan bible-reading-plan-today"></div>
        </section>

        <div class="bible-content-grid">
          <section class="bible-reader-panel" aria-live="polite">
            <div class="bible-reader-head">
              <div>
                <div class="bible-kicker" id="bible-version-label">English Standard Version 2011</div>
                <div class="bible-reader-title-row">
                  <h2 id="bible-current-title">John 1</h2>
                  <button class="bible-mini-btn bible-overview-btn" id="bible-book-overview" type="button">Overview</button>
                </div>
              </div>
              <div class="bible-chapter-nav">
                <button class="bible-icon-btn" id="bible-prev-chapter" type="button" aria-label="Previous chapter" title="Previous chapter">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
                </button>
                <select id="bible-chapter-select" aria-label="Chapter"></select>
                <button class="bible-icon-btn" id="bible-next-chapter" type="button" aria-label="Next chapter" title="Next chapter">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
                </button>
              </div>
            </div>

            <div class="bible-chapter-strip" id="bible-chapter-strip" aria-label="Chapters"></div>
            <nav class="bible-study-jumpbar" aria-label="Study tools">
              <button type="button" data-study-jump="bible-crossrefs-panel">TSK</button>
              <button type="button" data-study-jump="bible-original-panel">Interlinear</button>
              <button type="button" data-study-jump="bible-commentary-panel">Library</button>
              <button type="button" data-study-jump="bible-search-panel">Search</button>
              <button type="button" data-study-jump="bible-bookmarks-panel">Saved</button>
            </nav>
            <div class="bible-selection-bar" id="bible-selection-bar" hidden>
              <span class="bible-selection-count" id="bible-selection-count">0 selected</span>
              <div class="bible-selection-actions">
                <button class="bible-mini-btn" id="bible-selection-copy" type="button">Copy</button>
                <button class="bible-mini-btn" id="bible-selection-share" type="button">Share</button>
                <button class="bible-mini-btn" id="bible-selection-save" type="button">Save</button>
                <button class="bible-mini-btn" id="bible-selection-clear" type="button">Clear</button>
              </div>
            </div>
            <article class="bible-passage" id="bible-passage" tabindex="0"></article>
          </section>

          <aside class="bible-original-panel" id="bible-original-panel" aria-label="Original language tools">
            <section class="bible-tool-section bible-original-section" tabindex="-1">
              <div class="bible-tool-head">
                <div>
                  <div class="bible-kicker">Original</div>
                  <h3>Interlinear</h3>
                </div>
                <span class="bible-muted" id="bible-original-count"></span>
              </div>
              <div id="bible-original" class="bible-original"></div>
            </section>
          </aside>

          <aside class="bible-study-panel" aria-label="Study tools">
            <section class="bible-tool-section" id="bible-crossrefs-panel" tabindex="-1">
              <div class="bible-tool-head">
                <div>
                  <div class="bible-kicker">References</div>
                  <h3>Cross References</h3>
                </div>
                <span class="bible-muted" id="bible-crossref-count"></span>
              </div>
              <div id="bible-crossrefs" class="bible-crossrefs"></div>
            </section>

            <section class="bible-tool-section" id="bible-commentary-panel" tabindex="-1">
              <div class="bible-tool-head">
                <div>
                  <div class="bible-kicker">Commentary</div>
                  <h3>Study Library</h3>
                </div>
                <span class="bible-muted" id="bible-commentary-count"></span>
              </div>
              <div id="bible-commentaries" class="bible-commentaries"></div>
            </section>

            <section class="bible-tool-section" id="bible-search-panel" tabindex="-1">
              <div class="bible-tool-head">
                <div>
                  <div class="bible-kicker">Search</div>
                  <h3>Find Text</h3>
                </div>
                <span class="bible-muted" id="bible-search-count"></span>
              </div>
              <form id="bible-search-form" class="bible-search-form">
                <input id="bible-search-input" type="search" autocomplete="off" placeholder="grace, shepherd, fear not">
                <button class="bible-btn" type="submit">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
                  <span>Search</span>
                </button>
              </form>
              <div class="bible-search-results" id="bible-search-results"></div>
            </section>

            <section class="bible-tool-section" id="bible-bookmarks-panel" tabindex="-1">
              <div class="bible-tool-head">
                <div>
                  <div class="bible-kicker">Saved</div>
                  <h3>Bookmarks</h3>
                </div>
                <button class="bible-mini-btn" id="bible-clear-bookmarks" type="button">Clear</button>
              </div>
              <div class="bible-saved-list" id="bible-bookmark-list"></div>
            </section>
          </aside>
        </div>
      </section>
    </main>
  </div>

  <div class="bible-sidebar-backdrop" id="bible-sidebar-backdrop" hidden></div>
  <div class="bible-drawer-backdrop" id="bible-drawer-backdrop" hidden></div>
  <aside class="bible-drawer" id="bible-drawer" aria-hidden="true" aria-label="Bible drawer">
    <header class="bible-drawer-head">
      <div>
        <div class="bible-kicker" id="bible-drawer-kicker">Journal</div>
        <h2 id="bible-drawer-title">Save Note</h2>
      </div>
      <button class="bible-icon-btn" id="bible-close-drawer" type="button" aria-label="Close" title="Close">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </header>
    <div class="bible-drawer-body" id="bible-drawer-body"></div>
  </aside>

  <div class="bible-reader-tools" aria-label="Reading controls">
    <button class="bible-reader-fab" id="bible-reader-toggle" type="button" aria-expanded="false" aria-controls="bible-reader-menu" aria-label="Text size" title="Text size">
      <strong>Aa</strong>
    </button>
    <div class="bible-reader-menu" id="bible-reader-menu" role="menu" aria-label="Text size" hidden>
      <button class="bible-reader-size-option" type="button" data-reading-size="0.92">Smaller</button>
      <button class="bible-reader-size-option is-active" type="button" data-reading-size="1">Normal (Default)</button>
      <button class="bible-reader-size-option" type="button" data-reading-size="1.08">Large</button>
      <button class="bible-reader-size-option" type="button" data-reading-size="1.16">XL</button>
      <button class="bible-reader-size-option" type="button" data-reading-size="1.24">XXL</button>
      <button class="bible-reader-size-option" type="button" data-reading-size="1.32">XXXL</button>
    </div>
  </div>

  <div id="bible-toasts" aria-live="polite"></div>

  <script type="module" src="app.bible/bible.js"></script>
</body>
</html>

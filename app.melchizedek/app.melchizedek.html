  <!-- Pull-to-Refresh -->
  <script>
  (function () {
    if (window.innerWidth > 860) return;
    var mainEl  = document.getElementById('gp-main');
    var ptr     = document.getElementById('ptrIndicator');
    if (!mainEl || !ptr) return;
    var startY = 0, pulling = false, triggered = false;
    mainEl.addEventListener('touchstart', function (e) {
      if (mainEl.scrollTop > 5) return;
      startY = e.touches[0].clientY; pulling = true; triggered = false;
    }, { passive: true });
    mainEl.addEventListener('touchmove', function (e) {
      if (!pulling) return;
      var dy = e.touches[0].clientY - startY;
      if (dy > 60 && !triggered) { triggered = true; ptr.classList.add('visible'); }
      else if (dy < 30) { triggered = false; ptr.classList.remove('visible'); }
    }, { passive: true });
    mainEl.addEventListener('touchend', function () {
      if (triggered) { ptr.textContent = 'Refreshing…'; setTimeout(function () { location.reload(); }, 300); }
      else { ptr.classList.remove('visible'); }
      pulling = false; triggered = false;
    }, { passive: true });
  })();
  </script>

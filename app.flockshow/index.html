<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Resolve all relative paths from the parent New_Covenant/ directory -->
  <base href="../">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <title>FlockShow — Sign In</title>

  <!-- PWA -->
  <link rel="manifest" href="app.flockshow/manifest.json">
  <link rel="icon" type="image/svg+xml" href="Images/icon-show.svg">
  <link rel="apple-touch-icon" href="Images/icon-show.svg">
  <meta name="theme-color" content="#e8a838">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="FlockShow">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Fonts — Inter + Merriweather (Herald system) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Merriweather:wght@700;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="Styles/new_covenant.css">
  <link rel="stylesheet" href="Styles/herald-tokens.css">
  <link rel="stylesheet" href="Styles/flockshow.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --fs-accent:     #e8a838;
      --fs-accent-dk:  #c48a20;
      --fs-danger:     #ef4444;
      --fs-radius-xl:  24px;
      --fs-radius-md:  14px;
      --fs-border:     rgba(15,23,42,.1);
      --fs-ink:        #111827;
      --fs-ink-muted:  #64748b;
      --fs-ink-faint:  #94a3b8;
    }

    html, body {
      height: 100%;
      font-family: Inter, system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      background:
        radial-gradient(circle at top left, rgba(247,199,86,.16), transparent 32rem),
        radial-gradient(circle at top right, rgba(72,211,217,.12), transparent 30rem),
        linear-gradient(180deg, #ffffff 0%, #f8fafc 42%, #f1f5f9 100%);
    }

    .card {
      position: relative; z-index: 1;
      background: #ffffff;
      border: 1px solid var(--fs-border);
      border-radius: var(--fs-radius-xl);
      padding: 44px 40px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow:
        0 22px 60px rgba(15,23,42,.1),
        0 4px 16px rgba(15,23,42,.06);
    }

    .brand {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 36px;
    }
    .brand-icon {
      width: 54px; height: 54px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--fs-accent), #f97316);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(232,168,56,.35);
    }
    .brand-name {
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: -.02em;
      color: var(--fs-ink);
    }
    .brand-sub {
      font-size: .75rem;
      color: var(--fs-ink-muted);
      margin-top: 3px;
    }

    .form-title {
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--fs-accent);
      margin-bottom: 22px;
    }

    .field-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: .78rem;
      font-weight: 600;
      color: var(--fs-ink-muted);
      margin-bottom: 7px;
    }
    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: #f8fafc;
      border: 1px solid var(--fs-border);
      border-radius: var(--fs-radius-md);
      color: var(--fs-ink);
      font-family: inherit;
      font-size: .9rem;
      padding: 12px 15px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      -webkit-appearance: none;
    }
    input:focus {
      border-color: var(--fs-accent);
      box-shadow: 0 0 0 3px rgba(232,168,56,.18);
    }
    input::placeholder { color: var(--fs-ink-faint); }

    .btn-signin {
      width: 100%;
      background: linear-gradient(135deg, var(--fs-accent) 0%, var(--fs-accent-dk) 100%);
      color: #1a0f00;
      border: none;
      border-radius: var(--fs-radius-md);
      font-family: inherit;
      font-size: .9rem;
      font-weight: 800;
      padding: 14px;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .15s, transform .1s, box-shadow .15s;
      box-shadow: 0 4px 20px rgba(232,168,56,.35);
    }
    .btn-signin:hover  { opacity: .92; box-shadow: 0 6px 24px rgba(232,168,56,.45); }
    .btn-signin:active { transform: scale(.98); }
    .btn-signin:disabled { opacity: .45; cursor: not-allowed; box-shadow: none; }

    .error-msg {
      display: none;
      background: rgba(248,113,113,.08);
      border: 1px solid rgba(248,113,113,.25);
      border-radius: 8px;
      color: var(--fs-danger);
      font-size: .82rem;
      padding: 10px 14px;
      margin-top: 16px;
      line-height: 1.5;
    }
    .error-msg.visible { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 15px; height: 15px;
      border: 2px solid rgba(26,15,0,.3);
      border-top-color: #1a0f00;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    .foot-note {
      text-align: center;
      color: var(--fs-ink-muted);
      font-size: .73rem;
      margin-top: 24px;
    }
    .return-home-link {
      display: block; text-align: center; margin-top: 14px;
      font-size: .73rem; color: var(--fs-ink-muted);
      text-decoration: none; transition: opacity .15s;
    }
    .return-home-link:hover { opacity: .75; }
  </style>
</head>
<body>

  <div class="card">
    <div class="brand">
      <div class="brand-icon" aria-hidden="true">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="14" rx="2" ry="2"/>
          <path d="M8 21h8M12 17v4"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">FlockShow</div>
        <div class="brand-sub">Worship Presentation & Display</div>
      </div>
    </div>

    <div class="form-title">Sign in to continue</div>

    <form id="signin-form" method="post" autocomplete="on" novalidate>
      <div class="field-group">
        <label for="fs-email">Email</label>
        <input type="email" id="fs-email" name="email" placeholder="you@church.com" autocomplete="email" required>
      </div>

      <div class="field-group">
        <label for="fs-pass">Passcode</label>
        <input type="password" id="fs-pass" name="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>

      <button type="submit" class="btn-signin" id="fs-submit">Sign In</button>
    </form>

    <div class="error-msg" id="fs-error"></div>

    <p class="foot-note">"Praise Him with strings and pipe." — Psalm 150:4</p>
    <a href="index.html" class="return-home-link">← Return to Home</a>
  </div>

  <!-- Firebase & auth dependencies (same order as app.flockshow.html) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js" defer></script>
  <script defer src="Scripts/firm_foundation.js"></script>
  <script defer src="Scripts/the_upper_room.js"></script>
  <script defer src="Scripts/the_true_vine.js"></script>

  <script>
    (function () {
      var APP_URL = 'app.flockshow/app.flockshow.html';

      function ready(fn) {
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', fn);
        } else {
          fn();
        }
      }

      ready(function () {
        if (typeof Nehemiah !== 'undefined' && Nehemiah.isAuthenticated()) {
          window.location.replace(APP_URL);
          return;
        }

        var form   = document.getElementById('signin-form');
        var btn    = document.getElementById('fs-submit');
        var errBox = document.getElementById('fs-error');

        function showError(msg) {
          errBox.textContent = msg;
          errBox.classList.add('visible');
        }
        function clearError() {
          errBox.classList.remove('visible');
        }
        function setLoading(on) {
          btn.disabled = on;
          btn.innerHTML = on
            ? '<span class="spinner"></span>Signing in…'
            : 'Sign In';
        }

        form.addEventListener('submit', async function (e) {
          e.preventDefault();
          clearError();

          var email = document.getElementById('fs-email').value.trim();
          var pass  = document.getElementById('fs-pass').value;

          if (!email || !pass) {
            showError('Please enter your email and passcode.');
            return;
          }

          if (typeof Nehemiah === 'undefined') {
            showError('Auth system not loaded yet. Please refresh and try again.');
            return;
          }

          setLoading(true);
          try {
            await Nehemiah.login(email, pass);
            window.location.replace(APP_URL);
          } catch (err) {
            setLoading(false);
            showError(err.message || 'Sign in failed. Check your credentials and try again.');
          }
        });
      });
    })();
  </script>

</body>
</html>

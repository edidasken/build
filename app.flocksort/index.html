<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#091326">
  <title>FlockSort</title>
  <style>
    html,
    body {
      min-height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at 28% 12%, rgba(212, 175, 55, 0.18), transparent 18rem),
        linear-gradient(180deg, #091326, #14233a);
      color: #ffffff;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
    }

    a {
      display: inline-grid;
      gap: 10px;
      place-items: center;
      color: #ffffff;
      font-weight: 900;
      text-decoration: none;
    }

    a::before {
      content: "";
      width: 72px;
      height: 72px;
      border: 4px solid rgba(255, 255, 255, 0.9);
      border-top-color: #d4af37;
      border-radius: 18px 18px 26px 26px;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.62), transparent 34% 72%, rgba(255, 255, 255, 0.22)),
        linear-gradient(180deg, transparent 12%, #d4af37 12% 46%, #12304a 46% 100%);
      box-shadow: 0 20px 42px rgba(0, 0, 0, 0.34);
    }
  </style>
  <script>
    location.replace('flock_sort.html' + (location.search || '') + (location.hash || ''));
  </script>
</head>
<body>
  <a href="flock_sort.html">FlockSort</a>
</body>
</html>

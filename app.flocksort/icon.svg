<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">FlockSort</title>
  <desc id="desc">A glowing Herald-style potion bottle for FlockSort.</desc>
  <defs>

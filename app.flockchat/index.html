<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Resolve all relative paths from the parent New_Covenant/ directory -->
  <base href="../">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <title>FlockChat — Sign In</title>

  <!-- PWA -->
  <link rel="manifest" href="app.flockchat/manifest.json">
  <link rel="icon" type="image/svg+xml" href="Images/icon-chat.svg">
  <link rel="apple-touch-icon" href="Images/Chat.png">
  <meta name="theme-color" content="#06b6d4">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="FlockChat">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">


  <link rel="stylesheet" href="Styles/app-login.css">
</head>
<body>

  <div class="bg-glow"></div>

  <div class="card">
    <div class="brand">
      <div class="brand-icon" aria-hidden="true">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">FlockChat</div>
        <div class="brand-sub">Church Team Messaging</div>
      </div>
    </div>

    <div class="form-title">Sign in to continue</div>

    <form id="signin-form" method="post" autocomplete="on" novalidate>
      <div class="field-group">
        <label for="fc-email">Email</label>
        <input type="email" id="fc-email" name="email" placeholder="you@church.com" autocomplete="email" required>
      </div>

      <div class="field-group">
        <label for="fc-pass">Passcode</label>
        <input type="password" id="fc-pass" name="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>

      <button type="submit" class="btn-signin" id="fc-submit">Sign In</button>
    </form>

    <div class="error-msg" id="fc-error"></div>

    <p class="foot-note">"How good and pleasant it is when God's people live together in unity!" — Psalm 133:1</p>
    <a href="index.html" class="return-home-link">← Return to Home</a>
  </div>

  <!-- Firebase & auth dependencies (same order as app.flockchat.html) -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-messaging-compat.js" defer></script>
  <script defer src="Scripts/firm_foundation.js"></script>
  <script defer src="Scripts/the_upper_room.js"></script>
  <script defer src="Scripts/the_true_vine.js"></script>

  <script>
    (function () {
      var APP_URL = 'app.flockchat/app.flockchat.html';

      function buildAppUrl() {
        return APP_URL + window.location.search + window.location.hash;
      }

      function ready(fn) {
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', fn);
        } else {
          fn();
        }
      }

      ready(function () {
        if (typeof Nehemiah !== 'undefined' && Nehemiah.isAuthenticated()) {
          window.location.replace(buildAppUrl());
          return;
        }

        var form   = document.getElementById('signin-form');
        var btn    = document.getElementById('fc-submit');
        var errBox = document.getElementById('fc-error');

        function showError(msg) {
          errBox.textContent = msg;
          errBox.classList.add('visible');
        }
        function clearError() {
          errBox.classList.remove('visible');
        }
        function setLoading(on) {
          btn.disabled = on;
          btn.innerHTML = on
            ? '<span class="spinner"></span>Signing in…'
            : 'Sign In';
        }

        form.addEventListener('submit', async function (e) {
          e.preventDefault();
          clearError();

          var email = document.getElementById('fc-email').value.trim();
          var pass  = document.getElementById('fc-pass').value;

          if (!email || !pass) {
            showError('Please enter your email and passcode.');
            return;
          }

          if (typeof Nehemiah === 'undefined') {
            showError('Auth system not loaded yet. Please refresh and try again.');
            return;
          }

          setLoading(true);
          try {
            await Nehemiah.login(email, pass);
            window.location.replace(buildAppUrl());
          } catch (err) {
            setLoading(false);
            showError(err.message || 'Sign in failed. Check your credentials and try again.');
          }
        });
      });
    })();
  </script>

</body>
</html>

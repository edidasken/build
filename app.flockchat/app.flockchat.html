<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <base href="../">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <title>FlockChat — Herald Edition</title>
  <link rel="icon" type="image/png" href="Images/icon-chat.svg">
  <link rel="apple-touch-icon" href="Images/icon-chat.svg">
  <link rel="manifest" href="app.flockchat/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FlockChat">
  <meta name="theme-color" content="#0f172a">
  <meta name="description" content="FlockChat — Church messaging in the Herald design">

  <!-- Herald fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Merriweather:wght@700;900&display=swap" rel="stylesheet">

  <!-- Herald theme bootstrap (before stylesheet to prevent flash) -->
  <script>
    document.documentElement.setAttribute('data-theme', 'herald');
  </script>

  <!-- Shared stylesheet -->
  <link rel="stylesheet" href="Styles/new_covenant.css">
  <link rel="stylesheet" href="Styles/herald-tokens.css">
  <link rel="stylesheet" href="Styles/flockchat.css">
</head>
<body>

  <!-- Boot Splash (Herald navy/gold) -->
  <div id="fc-boot">
    <div class="fc-boot-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </div>
    <div class="fc-boot-name">FlockChat</div>
    <div class="fc-boot-spinner"></div>
    <div class="fc-boot-status" id="fc-boot-status">Connecting…</div>
  </div>

  <!-- App -->
  <div id="fc-app" hidden>

    <!-- Unity Header (mounted by JS) -->
    <header id="fc-topbar" class="unity-header" role="banner"></header>

    <!-- Main Container -->
    <div class="fc-container">

      <!-- Conversation List -->
      <div class="fc-list-pane">
        <div class="fc-list-header">
          <div class="fc-list-kicker">Herald Messenger</div>
          <div class="fc-list-title-row">
            <h1 class="fc-list-title">FlockChat</h1>
            <button class="fc-new-btn" id="fc-new-btn" title="New Conversation">✎</button>
          </div>
          <p class="fc-list-subtitle">Church messaging inside the Herald public shell.</p>
          <input type="text" class="fc-list-search" placeholder="Search conversations..." id="fc-search">
        </div>
        <div class="fc-list-scroll" id="fc-list">
          <!-- Populated by JS -->
        </div>
      </div>

      <!-- Message Thread -->
      <div class="fc-thread-pane" id="fc-thread">
        <div class="fc-thread-header">
          <button class="fc-back-btn" id="fc-back">←</button>
          <div class="fc-thread-icon" id="fc-thread-icon">👥</div>
          <div class="fc-thread-info">
            <div class="fc-thread-name" id="fc-thread-name">Select a conversation</div>
            <div class="fc-thread-meta" id="fc-thread-meta"></div>
          </div>
          <!-- Admin-only channel management button -->
          <button class="fc-manage-btn" id="fc-manage-btn" hidden
                  onclick="window._openChannelManager()" title="Manage channel">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
        </div>
        <div class="fc-messages" id="fc-messages">
          <!-- Messages populated by JS -->
        </div>
        <div class="fc-composer">
          <div class="fc-input-wrap">
            <textarea class="fc-input" id="fc-input" placeholder="FlockChat" rows="1"></textarea>
          </div>
          <button class="fc-send-btn" id="fc-send" disabled>↑</button>
        </div>

        <!-- Channel Manager Drawer (admin only) -->
        <div class="fc-mgr-overlay" id="fc-mgr-overlay" hidden
             onclick="window._closeChannelManager()"></div>
        <div class="fc-mgr-drawer" id="fc-mgr-drawer" hidden>
          <div class="fc-mgr-header">
            <div class="fc-mgr-title" id="fc-mgr-title">Manage Channel</div>
            <button class="fc-mgr-close" onclick="window._closeChannelManager()">✕</button>
          </div>
          <div class="fc-mgr-body" id="fc-mgr-body">
            <div class="fc-loading"><div class="fc-spinner"></div></div>
          </div>
        </div>

        <!-- Info Modal (full-screen read-only guide) -->
        <div class="fc-info-modal" id="fc-info-modal" hidden>
          <div class="fc-info-modal-header">
            <button class="fc-info-modal-back" onclick="window._closeInfoModal()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
              </svg>
              Back
            </button>
          </div>
          <div class="fc-info-modal-content">
            <div class="fc-info-modal-title" id="fc-info-modal-title"></div>
            <div class="fc-info-modal-subtitle" id="fc-info-modal-subtitle"></div>
            <div class="fc-info-modal-body" id="fc-info-modal-body"></div>
          </div>
        </div>
      </div>

    </div>

    <!-- Unity Footer removed -->

  </div>

  <!-- Toast Container -->
  <div id="fc-toasts" aria-live="polite"></div>

  <!-- New Conversation Modal -->
  <div class="fc-modal-backdrop" id="fc-new-modal" hidden>
    <div class="fc-modal">
      <div class="fc-modal-header">
        <h2 class="fc-modal-title">New Conversation</h2>
        <button class="fc-modal-close" id="fc-modal-close">&times;</button>
      </div>
      <div class="fc-modal-body">
        <input type="text" class="fc-modal-search" id="fc-user-search" placeholder="Search members...">
        <div id="fc-user-list"></div>
      </div>
    </div>
  </div>

  <!-- FCM VAPID key is stored in Firestore: settings/notifications → { vapidKey: "B..." }
       Get from Firebase Console → Project Settings → Cloud Messaging → Web Push certificates
       This keeps the key out of source control and makes it per-church configurable. -->

  <!-- Firebase Config -->
  <script>
    window.FLOCK_FIREBASE_CONFIG = {
      apiKey:            'AIzaSyBA-fkxjABbwIHn0i6MPiXbGwahfJmuJeo',
      authDomain:        'flockos-notify.firebaseapp.com',
      projectId:         'flockos-notify',
      storageBucket:     'flockos-notify.firebasestorage.app',
      messagingSenderId: '321766738616',
      appId:             '1:321766738616:web:d2c1c53ad7493fcde4c24d',
      measurementId:     'G-EFMSZE581W'
    };
  </script>
  <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-messaging-compat.js"></script>

  <!-- Core scripts -->
  <script defer src="Scripts/firm_foundation.js"></script>
  <script defer src="Scripts/the_upper_room.js"></script>
  <script defer src="Scripts/the_true_vine.js"></script>

  <!-- Unity header -->
  <script type="module">
    import { mountUnityHeader } from './Scripts/the_unity_header.js';

    window.addEventListener('load', () => {
      let user = null;
      try {
        const raw = sessionStorage.getItem('flock_auth_session') || sessionStorage.getItem('flock_auth_profile');
        const s = raw ? JSON.parse(raw) : null;
        if (s && s.email) {
          user = {
            displayName: s.displayName || s.name || s.email.split('@')[0],
            email:       s.email,
            photoURL:    s.photoURL || '',
          };
        }
      } catch (_) {}

      mountUnityHeader(document.getElementById('fc-topbar'), {
        appId: 'flockchat',
        appName: 'FlockChat',
        appIconSvg: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>',
        appAccent: '#06b6d4',
        appAccentDk: '#0c4a6e',
        homeHref: 'app.flockchat/',
        user,
        signInHref: 'app.flockchat/',
        onHamburger: () => {
          document.getElementById('fc-thread')?.classList.remove('active');
          return false;
        },
        features: [
          { id: 'fc-conversations', label: 'All Conversations', hint: 'Browse all channels', run: () => document.getElementById('fc-back')?.click() },
          { id: 'fc-announcements', label: 'Announcements',     hint: 'Church announcements', run: () => window._openConversation?.('announcements') },
          { id: 'fc-prayer',        label: 'Prayer Chain',      hint: 'Church prayer requests', run: () => window._openConversation?.('prayer') },
        ],
      });
    });
  </script>

  <!-- FlockChat v3 logic -->
  <script defer src="app.flockchat/flockchat.js"></script>

  <!-- Auto-linkify scripture references -->
  <script type="module">
    import { installScriptureLinks } from './Scripts/the_scrolls/the_bible_link.js';
    installScriptureLinks(document.body);
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Resolve all relative paths from the parent New_Covenant/ directory -->
  <base href="../">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <title>FEED — Sign In</title>

  <!-- PWA -->
  <link rel="manifest" href="app.feed/manifest.json">
  <link rel="icon" type="image/svg+xml" href="Images/icon-feed.svg">
  <link rel="apple-touch-icon" href="Images/icon-feed.svg">
  <meta name="theme-color" content="#c48a20">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="FEED">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Merriweather:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="Styles/new_covenant.css">
  <link rel="stylesheet" href="Styles/feed-auth.css">
</head>
<body>

  <div class="bg-glow"></div>

  <div class="card">
    <div class="brand">
      <div class="brand-icon" aria-hidden="true">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      </div>
      <div>
        <div class="brand-name">FEED</div>
        <div class="brand-sub">FlockOS Sermon Builder</div>
      </div>
    </div>

    <div class="form-title">Sign in to continue</div>

    <form id="signin-form" method="post" autocomplete="on" novalidate>
      <div class="field-group">
        <label for="fd-email">Email</label>
        <input type="email" id="fd-email" name="email" placeholder="you@church.com" autocomplete="email" required>
      </div>

      <div class="field-group">
        <label for="fd-pass">Passcode</label>
        <input type="password" id="fd-pass" name="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>

      <button type="submit" class="btn-signin" id="fd-submit">Sign In</button>
    </form>

    <div class="error-msg" id="fd-error"></div>

    <p class="foot-note">Use your FlockOS church account credentials.</p>
    <a href="index.html" class="return-home-link">← Return to Home</a>
  </div>

  <!-- Firebase & auth dependencies (same order as feed.html) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js" defer></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js" defer></script>
  <script defer src="Scripts/firm_foundation.js"></script>
  <script defer src="Scripts/the_upper_room.js"></script>
  <script defer src="Scripts/the_true_vine.js"></script>

  <script>
    (function () {
      var FEED_URL = 'app.feed/feed.html';

      function ready(fn) {
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', fn);
        } else {
          fn();
        }
      }

      ready(function () {
        // If already authenticated, jump straight to the app
        if (typeof Nehemiah !== 'undefined' && Nehemiah.isAuthenticated()) {
          window.location.replace(FEED_URL);
          return;
        }

        var form   = document.getElementById('signin-form');
        var btn    = document.getElementById('fd-submit');
        var errBox = document.getElementById('fd-error');

        function showError(msg) {
          errBox.textContent = msg;
          errBox.classList.add('visible');
        }
        function clearError() {
          errBox.classList.remove('visible');
        }
        function setLoading(on) {
          btn.disabled = on;
          btn.innerHTML = on
            ? '<span class="spinner"></span>Signing in…'
            : 'Sign In';
        }

        form.addEventListener('submit', async function (e) {
          e.preventDefault();
          clearError();

          var email = document.getElementById('fd-email').value.trim();
          var pass  = document.getElementById('fd-pass').value;

          if (!email || !pass) {
            showError('Please enter your email and passcode.');
            return;
          }

          if (typeof Nehemiah === 'undefined') {
            showError('Auth system not loaded yet. Please refresh and try again.');
            return;
          }

          setLoading(true);
          try {
            await Nehemiah.login(email, pass);
            window.location.replace(FEED_URL);
          } catch (err) {
            setLoading(false);
            showError(err.message || 'Sign in failed. Check your credentials and try again.');
          }
        });
      });
    })();
  </script>

</body>
</html>
